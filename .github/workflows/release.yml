name: "📦 Release"
on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: "version bump method: major, minor, or patch"
        required: true
        default: "patch"
        options:
          - major
          - minor
          - patch

jobs:
  release:
    name: "📦 Release"
    runs-on: ubuntu-latest
    env:
      # Use a personal access token with push access to the repo.
      # If you don't, pushing a release and tag will not cause subsequent
      # workflows to run, like the update_major_version workflow.
      GITHUB_TOKEN: ${{ secrets.GH_BASIC }}
    steps:
      - name: 🧾 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_BASIC }}

      - name: 📐 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Rebuild dist/
        run: |
          npm run build
          npm run package

      - name: 🔎 Verify dist/ matches committed
        run: |
          if [ "$(git diff --ignore-all-space --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

      - name: 🔎 Read Current Project Version
        id: current-version
        run: |
          echo "tag=$(git tag --sort=v:refname | grep -E '^v[0-9]' | tail -1)" >> "$GITHUB_OUTPUT"

      - name: 🖨 Print Current Version
        run: |
          echo "Current Version: ${{ steps.current-version.outputs.tag }}"

      - name: 🧮 Compute Next Version
        uses: chickensoft-games/next-godot-csproj-version@v1
        id: next-version
        with:
          project-version: ${{ steps.current-version.outputs.tag }}
          godot-version: 1.0.0
          bump: ${{ inputs.bump }}

      - name: 🖨 Print Next Version
        run: |
          echo "Next Version: v${{ steps.next-version.outputs.version }}"

      - name: ✨ Create Release
        run: |
          version="v${{ steps.next-version.outputs.version }}"
          gh release create \
            --title "$version" \
            --generate-notes \
            "$version"
